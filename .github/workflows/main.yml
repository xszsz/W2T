name: Windows-RDP-Secure-Telegram-Final

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: 'مدة التشغيل بالدقائق (360 max)'
        required: false
        default: '360'

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Download Cloudflared
        run: curl -L --output cloudflared.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe

      - name: Check Secrets
        shell: pwsh
        run: |
          if ("${{ secrets.RDP_USERNAME }}" -eq "") { Write-Error "Missing RDP_USERNAME"; exit 1 }
          if ("${{ secrets.RDP_PASSWORD }}" -eq "") { Write-Error "Missing RDP_PASSWORD"; exit 1 }
          if ("${{ secrets.TELEGRAM_BOT_TOKEN }}" -eq "") { Write-Error "Missing TELEGRAM_BOT_TOKEN"; exit 1 }
          if ("${{ secrets.TELEGRAM_CHAT_ID }}" -eq "") { Write-Error "Missing TELEGRAM_CHAT_ID"; exit 1 }

      - name: Enable RDP and Create User
        shell: pwsh
        run: |
          $user = "${{ secrets.RDP_USERNAME }}"
          $pass = "${{ secrets.RDP_PASSWORD }}"
          Write-Host "::add-mask::$user"
          Write-Host "::add-mask::$pass"
          
          $existing = net user $user 2>$null
          if ($LASTEXITCODE -ne 0) {
            net user $user $pass /add
            net localgroup administrators $user /add
            Write-Host "User created."
          } else {
            net user $user $pass
            Write-Host "Password updated."
          }
          
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Restart-Service TermService -Force
          Start-Sleep -Seconds 10
          
          if (Test-NetConnection localhost -Port 3389 -InformationLevel Quiet) {
            Write-Host "Port 3389 OK"
          } else {
            Write-Error "Port 3389 failed"
          }

      - name: Start Tunnel, Send Telegram, and Keep Alive
        shell: pwsh
        run: |
          $stderrLog = "tunnel.log"
          $urlFile = "tunnel_url.txt"
          Remove-Item -Force $stderrLog, $urlFile -ErrorAction SilentlyContinue
          
          # ✅ تشغيل النفق في الخلفية
          $proc = Start-Process -FilePath ".\cloudflared.exe" `
            -ArgumentList @("tunnel", "--url", "rdp://localhost:3389") `
            -WindowStyle Hidden -PassThru `
            -RedirectStandardError $stderrLog
          
          $proc.Id | Out-File tunnel.pid
          Write-Host "Tunnel PID: $($proc.Id)"
          
          # انتظار الرابط الأول
          $url = $null
          for ($i=0; $i -lt 120; $i++) {
            Start-Sleep -Seconds 1
            if (Test-Path $stderrLog) {
              $content = Get-Content $stderrLog -Raw -ErrorAction SilentlyContinue
              if ($content -match '(https://[a-z0-9-]+\.trycloudflare\.com)') {
                $url = $matches[1]
                break
              }
            }
          }
          
          if (-not $url) {
            Write-Host "Failed to get URL. Log:"
            Get-Content $stderrLog -ErrorAction SilentlyContinue
            exit 1
          }
          
          # ✅ إخفاء الرابط
          Write-Host "::add-mask::$url"
          Write-Host "URL obtained"
          $url | Out-File $urlFile
          
          # ✅ إرسال الرابط الأول إلى Telegram
          $hostname = $url -replace 'https://',''
          $user = "${{ secrets.RDP_USERNAME }}"
          $pass = "${{ secrets.RDP_PASSWORD }}"
          $duration = "${{ github.event.inputs.duration_minutes }}"
          
          $msg = "✅ RDP Tunnel Ready%0A%0A"
          $msg += "🔗 URL: $url%0A"
          $msg += "🖥️ Host: $hostname%0A%0A"
          $msg += "👤 User: $user%0A"
          $msg += "🔑 Pass: $pass%0A%0A"
          $msg += "📥 Connect:%0A"
          $msg += "cloudflared access rdp --hostname $hostname --url localhost:3333%0A"
          $msg += "Then mstsc → localhost:3333%0A%0A"
          $msg += "⏱️ $duration minutes"
          
          $api = "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"
          $body = "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=$msg"
          Invoke-RestMethod -Uri $api -Method Post -Body $body -ContentType "application/x-www-form-urlencoded" | Out-Null
          
          # ✅ Keep Alive + مراقبة في نفس الخطوة
          $minutes = [int]"${{ github.event.inputs.duration_minutes }}"
          if ($minutes -gt 360) { $minutes = 360 }
          $totalSeconds = $minutes * 60
          $elapsed = 0
          
          while ($elapsed -lt $totalSeconds) {
            # التحقق من أن النفق لا يزال يعمل
            $cfProcess = Get-Process -Id (Get-Content tunnel.pid) -ErrorAction SilentlyContinue
            if (-not $cfProcess -or $cfProcess.HasExited) {
              Write-Host "⚠️ Tunnel died! Restarting..."
              
              # إعادة تشغيل
              Remove-Item -Force $stderrLog -ErrorAction SilentlyContinue
              $proc = Start-Process -FilePath ".\cloudflared.exe" `
                -ArgumentList @("tunnel", "--url", "rdp://localhost:3389") `
                -WindowStyle Hidden -PassThru `
                -RedirectStandardError $stderrLog
              $proc.Id | Out-File tunnel.pid
              
              # انتظار رابط جديد
              $newUrl = $null
              for ($i=0; $i -lt 60; $i++) {
                Start-Sleep -Seconds 1
                $content = Get-Content $stderrLog -Raw -ErrorAction SilentlyContinue
                if ($content -match '(https://[a-z0-9-]+\.trycloudflare\.com)') {
                  $newUrl = $matches[1]
                  break
                }
              }
              
              if ($newUrl) {
                Write-Host "::add-mask::$newUrl"
                Write-Host "🔄 New URL obtained"
                $newUrl | Out-File $urlFile
                
                # إرسال الرابط الجديد
                $hostname = $newUrl -replace 'https://',''
                $msg = "🔄 Tunnel Restarted!%0A%0A"
                $msg += "🔗 New URL: $newUrl%0A"
                $msg += "🖥️ Host: $hostname%0A%0A"
                $msg += "👤 User: $user%0A"
                $msg += "🔑 Pass: $pass%0A"
                
                $body = "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=$msg"
                Invoke-RestMethod -Uri $api -Method Post -Body $body -ContentType "application/x-www-form-urlencoded" | Out-Null
              }
            }
            
            # طباعة حالة كل دقيقة
            if ($elapsed % 60 -eq 0) {
              $remaining = [math]::Floor(($totalSeconds - $elapsed) / 60)
              Write-Host "⏱️ Running... $remaining minutes left"
            }
            
            Start-Sleep -Seconds 10
            $elapsed += 10
          }

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          if (Test-Path tunnel.pid) { 
            Stop-Process -Id (Get-Content tunnel.pid) -Force -ErrorAction SilentlyContinue 
          }
          Get-Process -Name cloudflared -ErrorAction SilentlyContinue | Stop-Process -Force
          $user = "${{ secrets.RDP_USERNAME }}"
          if ($user) { net user $user /delete 2>$null }
          Write-Host "Cleanup done."
